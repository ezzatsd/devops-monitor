name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

env:
  API_IMAGE: devops-monitor-api
  DASHBOARD_IMAGE: devops-monitor-dashboard

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push API image
        run: |
          docker build -f api/Dockerfile -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ github.sha }} .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build and push dashboard image
        run: |
          docker build -f dashboard/Dockerfile -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.DASHBOARD_IMAGE }}:${{ github.sha }} .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API container app
        run: |
          az containerapp update \
            --name devops-monitor-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ github.sha }} \
            --set-env-vars API_KEY=${{ secrets.API_KEY }}

      - name: Deploy dashboard container app
        run: |
          az containerapp update \
            --name devops-monitor-dashboard \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.DASHBOARD_IMAGE }}:${{ github.sha }} \
            --set-env-vars API_BASE_URL=${{ secrets.API_BASE_URL }} API_KEY=${{ secrets.API_KEY }}
