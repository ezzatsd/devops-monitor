services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: devops-monitor-api
    env_file: .env
    environment:
      API_KEY: ${API_KEY}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: devops-monitor-dashboard
    env_file: .env
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      API_KEY: ${API_KEY}
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy
